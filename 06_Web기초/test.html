<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        function ok() {
            console.log("ok");
        }

        function init() {
            //이벤트 연결
            var btn = document.querySelector("#x");
            console.log(btn);
            btn.onclick = ok;
        }

    </script>

</head>

<body onload="init()">
    <button id="x">ok</button>
</body>

</html>
